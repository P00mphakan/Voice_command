<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Voice Agent - Multi-User Version</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; text-align: center; padding-top: 40px; }
        .btn { padding: 12px 25px; font-size: 16px; border: none; border-radius: 25px; cursor: pointer; transition: 0.3s; margin: 10px; font-weight: bold; }
        .record { background: #4CAF50; color: white; }
        .recording { background: #222; color: #f44336; border: 2px solid #f44336; }
        .status { margin-top: 20px; font-size: 18px; color: #aaa; padding: 10px; }
        .log-box { margin: 20px auto; width: 80%; max-width: 600px; background: #1e1e1e; border: 1px solid #333; padding: 15px; text-align: left; border-radius: 10px; font-family: monospace; font-size: 14px; color: #00FF00; max-height: 250px; overflow-y: auto; }
        .visualizer-container { display: flex; justify-content: center; align-items: center; height: 100px; margin-top: 10px; }
        #audioCircle { width: 40px; height: 40px; background: rgba(76, 175, 80, 0.2); border: 3px solid #4CAF50; border-radius: 50%; transition: transform 0.05s ease-out; }
    </style>
</head>
<body>

    <h1>Voice Agent 🚀 (ระบบสั่งเสียง)</h1>
    <p>กดปุ่มสีเขียวแล้วพูดได้ทันทีครับ</p>
    
    <div>
        <button id="recordBtn" class="btn record">เริ่มพูดสั่งงาน</button>
    </div>
    
    <div class="visualizer-container">
        <div id="audioCircle"></div>
    </div>

    <div id="status" class="status">สถานะ: พร้อมใช้งาน</div>
    
    <div style="margin-top: 20px; font-weight: bold; color: #888;">ระบบบันทึกสถานะ (Debug Log):</div>
    <div id="logBox" class="log-box">>> รอรับข้อมูลเสียง...</div>
    <div id="logBox" class="log-box" style="display: none;">>> รอรับข้อมูลเสียง...</div>

    <script>
        const recordBtn = document.getElementById('recordBtn');
        const statusDiv = document.getElementById('status');
        const logBox = document.getElementById('logBox');
        const audioCircle = document.getElementById('audioCircle');
        
        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;
        let audioContext, analyser, dataArray, source, animationFrameId;

        function addLog(message) {
            console.log(`>> ${message}`);
            // logBox.innerHTML += `<br>>> ${message}`;
            // logBox.scrollTop = logBox.scrollHeight;
        }

        recordBtn.addEventListener('click', async () => {
            if (!isRecording) {
                audioChunks = [];
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    isRecording = true;
                    setupAudioVisualizer(stream);
                    
                    mediaRecorder = new MediaRecorder(stream);
                    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
                    
                    mediaRecorder.onstop = async () => {
                        statusDiv.innerText = "⚡ ส่งก้อนเสียงเข้าท่อลับ Vercel ประมวลผล...";
                        const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                        await processVoiceWithVercel(audioBlob);
                    };

                    mediaRecorder.start();
                    recordBtn.innerText = "กำลังฟัง... พูดเสร็จกดปุ่มนี้อีกครั้ง";
                    recordBtn.className = "btn recording";
                    statusDiv.innerText = "ระบบกำลังรับเสียงคำสั่ง...";
                } catch (err) {
                    statusDiv.innerText = "❌ เกิดข้อผิดพลาดระบบไมค์";
                    addLog(`Mic Error: ${err.message}`);
                }
            } else {
                if(mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
                isRecording = false;
                recordBtn.innerText = "เริ่มพูดสั่งงาน";
                recordBtn.className = "btn record";
                if (animationFrameId) cancelAnimationFrame(animationFrameId);
                if (audioContext) audioContext.close();
            }
        });

        function setupAudioVisualizer(stream) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            source = audioContext.createMediaStreamSource(stream);
            source.connect(analyser);
            analyser.fftSize = 32;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            
            function draw() {
                if (!isRecording) return;
                animationFrameId = requestAnimationFrame(draw);
                analyser.getByteFrequencyData(dataArray);
                let total = 0;
                for (let i = 0; i < dataArray.length; i++) total += dataArray[i];
                audioCircle.style.transform = `scale(${1 + ((total/dataArray.length) / 30)})`;
            }
            draw();
        }

        async function processVoiceWithVercel(audioBlob) {
            const formData = new FormData();
            formData.append("file", audioBlob, "audio.wav");
            formData.append("model", "whisper-large-v3");
            formData.append("language", "th");

            try {
                addLog("ยิงก้อนเสียงเข้าหา Serverless Function...");
                // 🔗 ยิงเข้าหาท่อลับตัวเอง (/api/transcribe) ระบบจะผูกคีย์หลังบ้านให้อัตโนมัติ
                const response = await fetch("/api/transcribe", {
                    method: "POST",
                    body: formData
                });
                
                const resData = await response.json();
                
                if (response.ok && resData.success) {
                    statusDiv.innerText = `✅ บันทึกประโยค "${resData.text}" สำเร็จ!`;
                    addLog(`[สำเร็จ] หลังบ้านดึงคีย์รันงานและโยนเข้า n8n เรียบร้อย: "${resData.text}"`);
                } else {
                    statusDiv.innerText = "❌ เกิดข้อผิดพลาดที่ระบบหลังบ้าน";
                    addLog(`Backend Error: ${JSON.stringify(resData)}`);
                }

            } catch (err) {
                console.error(err);
                statusDiv.innerText = "❌ การเชื่อมต่อเครือข่ายขัดข้อง";
                addLog(`Network Error: ${err.message}`);
            }
        }
    </script>
</body>
</html>
