<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mac Agent - Multi-User LIFF</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #121212; 
            color: #fff; 
            text-align: center; 
            padding: 20px 15px; 
            margin: 0;
            box-sizing: border-box;
        }
        h1 { font-size: 22px; margin-bottom: 5px; }
        p { font-size: 14px; color: #ccc; margin-bottom: 25px; }

        /* ✨ อัปเกรดปุ่มกดให้ใหญ่ ยักษ์ สะใจ กดง่ายบนมือถือ */
        .btn-container { margin: 25px auto; }
        .btn { 
            padding: 18px 40px; 
            font-size: 20px; 
            border: none; 
            border-radius: 40px; 
            cursor: pointer; 
            transition: all 0.2s ease-in-out; 
            font-weight: bold; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            width: 85%;
            max-width: 320px;
        }
        .record { 
            background: #4CAF50; 
            color: white; 
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.4);
        }
        .recording { 
            background: #f44336; 
            color: white; 
            border: none;
            animation: pulse-border 1.5s infinite;
            box-shadow: 0 0 25px rgba(244, 67, 54, 0.6);
        }
        
        /* ✨ ขยายขนาดวงกลม Visualizer ให้ใหญ่กระแทกตา */
        .visualizer-container { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 140px; 
            margin: 20px 0; 
        }
        #audioCircle { 
            width: 80px;         /* 🟢 ขยายใหญ่ขึ้นจากเดิมเท่าตัว */
            height: 80px;        /* 🟢 ขยายใหญ่ขึ้นจากเดิมเท่าตัว */
            background: rgba(76, 175, 80, 0.25); 
            border: 4px solid #4CAF50; 
            border-radius: 50%; 
            transition: transform 0.04s ease-out; 
        }
        
        .status { margin-top: 15px; font-size: 16px; color: #00FF00; font-weight: 500; }

        /* แอนิเมชันปุ่มตอนอัดเสียง */
        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(244, 67, 54, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(244, 67, 54, 0); }
            100% { box-shadow: 0 0 0 0 rgba(244, 67, 54, 0); }
        }

        /* ซ่อนกล่องบันทึกสถานะลับหลังบ้านตามบรีฟเดิม */
        .log-box { display: none; }
    </style>
</head>
<body>

    <h1>Voice Agent 🚀 (ระบบสั่งเสียง)</h1>
    <p>กดปุ่มยักษ์สีเขียวด้านล่าง แล้วพูดประโยคคำสั่งได้ทันทีครับ</p>
    
    <div class="btn-container">
        <button id="recordBtn" class="btn record">เริ่มพูดสั่งงาน</button>
    </div>
    
    <div class="visualizer-container">
        <div id="audioCircle"></div>
    </div>

    <div id="status" class="status">สถานะ: พร้อมใช้งาน</div>
    <div id="logBox" class="log-box"></div>

    <script>
        const recordBtn = document.getElementById('recordBtn');
        const statusDiv = document.getElementById('status');
        const audioCircle = document.getElementById('audioCircle');
        
        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;
        let audioContext, analyser, dataArray, source, animationFrameId;

        function addLog(message) {
            console.log(`>> ${message}`); 
        }

        recordBtn.addEventListener('click', async () => {
            if (!isRecording) {
                audioChunks = [];
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    isRecording = true;
                    setupAudioVisualizer(stream);
                    
                    mediaRecorder = new MediaRecorder(stream);
                    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
                    
                    mediaRecorder.onstop = async () => {
                        statusDiv.innerText = "⚡ กำลังส่งเสียงไปถอดความ...";
                        audioCircle.style.borderColor = "#ff9800"; // เปลี่ยนสีวงกลมตอนประมวลผล
                        audioCircle.style.background = "rgba(255, 152, 0, 0.2)";
                        const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                        await processVoiceWithVercel(audioBlob);
                    };

                    mediaRecorder.start();
                    recordBtn.innerText = "🛑 พูดเสร็จกดตรงนี้";
                    recordBtn.className = "btn recording";
                    statusDiv.innerText = "🎤 กำลังฟังเสียงของคุณ...";
                    audioCircle.style.borderColor = "#f44336";
                    audioCircle.style.background = "rgba(244, 67, 54, 0.2)";
                } catch (err) {
                    statusDiv.innerText = "❌ เกิดข้อผิดพลาดระบบไมค์";
                    addLog(`Mic Error: ${err.message}`);
                }
            } else {
                if(mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
                isRecording = false;
                recordBtn.innerText = "เริ่มพูดสั่งงาน";
                recordBtn.className = "btn record";
                if (animationFrameId) cancelAnimationFrame(animationFrameId);
                if (audioContext) audioContext.close();
            }
        });

        function setupAudioVisualizer(stream) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            source = audioContext.createMediaStreamSource(stream);
            source.connect(analyser);
            analyser.fftSize = 32;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            
            function draw() {
                if (!isRecording) return;
                animationFrameId = requestAnimationFrame(draw);
                analyser.getByteFrequencyData(dataArray);
                let total = 0;
                for (let i = 0; i < dataArray.length; i++) total += dataArray[i];
                
                // ✨ ปรับจังหวะสั่น (Scale) ของวงกลมตัวใหญ่ให้เคลื่อนไหวตอบรับเสียงได้ไวและนุ่มนวลขึ้น
                let amplitude = total / dataArray.length;
                let scaleFactor = 1 + (amplitude / 40); 
                audioCircle.style.transform = `scale(${scaleFactor})`;
            }
            draw();
        }

        async function processVoiceWithVercel(audioBlob) {
            const formData = new FormData();
            formData.append("file", audioBlob, "audio.wav");
            formData.append("model", "whisper-large-v3");
            formData.append("language", "th");

            try {
                addLog("ส่งไฟล์เสียงเข้าสู่ Serverless API ลับหลังบ้าน...");
                const response = await fetch("/api/transcribe", {
                    method: "POST",
                    body: formData
                });
                
                const resData = await response.json();
                
                if (response.ok && resData.success) {
                    statusDiv.innerText = `✅ ส่งคำสั่งสำเร็จ!`;
                    // รีเซ็ตหน้าจอกลับมาสีเขียวปกติพร้อมรับคำสั่งถัดไป
                    setTimeout(() => {
                        statusDiv.innerText = "สถานะ: พร้อมใช้งาน";
                        audioCircle.style.borderColor = "#4CAF50";
                        audioCircle.style.background = "rgba(76, 175, 80, 0.25)";
                        audioCircle.style.transform = "scale(1)";
                    }, 2500);
                } else {
                    statusDiv.innerText = "❌ หลังบ้านขัดข้อง ลองอีกครั้ง";
                    addLog(`Backend Error: ${JSON.stringify(resData)}`);
                }

            } catch (err) {
                console.error(err);
                statusDiv.innerText = "❌ เครือข่ายขัดข้อง";
                addLog(`Network Error: ${err.message}`);
            }
        }
    </script>
</body>
</html>
